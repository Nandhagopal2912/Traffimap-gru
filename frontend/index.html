<!DOCTYPE html>
<html>
<head>
  <title>Real Traffic Prediction</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([34.05, -118.25], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let markers = [];

  // 🔹 Load REAL sensor coordinates from backend
  async function loadSensors() {
    const res = await fetch("http://127.0.0.1:8000/sensors");
    const data = await res.json();

    const sensors = data.sensors;

    sensors.forEach(coord => {
      const marker = L.circleMarker(coord, {
        radius: 5,
        color: 'green',
        fillOpacity: 0.7
      }).addTo(map);

      markers.push(marker);
    });
  }

  // 🔹 Get predictions
  async function updateTraffic() {
    const res = await fetch("http://127.0.0.1:8000/predict");
    const data = await res.json();

    const preds = data.prediction;

    markers.forEach((marker, i) => {
      const val = preds[i];

      let color = "green";
      if (val < -0.5) color = "red";
      else if (val < 0.5) color = "orange";

      marker.setStyle({ color: color });
    });
  }

  // Load sensors first
  loadSensors().then(() => {
    setInterval(updateTraffic, 3000);
  });

</script>

</body>
</html>
